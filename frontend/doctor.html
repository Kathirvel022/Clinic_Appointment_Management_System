<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - MediCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="favicon.png" type="image/x-icon">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fa-solid fa-user-doctor me-2"></i>MediCare Doctor Portal
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span id="userName" class="me-3 fw-bold"></span>
                <button id="themeToggle" class="btn btn-outline-secondary rounded-circle me-3">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="btn btn-outline-danger" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row mb-4">
            <div class="col">
                <h2 class="fw-bold">My Schedule</h2>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card p-4 shadow-sm animate-fade-up">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Patient ID</th>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Reason</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="appointmentsList">
                                <tr><td colspan="6" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notes Modal -->
    <div class="modal fade" id="notesModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content bg-surface" style="color: var(--text-primary)">
          <div class="modal-header border-bottom border-secondary">
            <h5 class="modal-title">Consultation Notes</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <textarea id="consultationNotes" class="form-control" rows="5" placeholder="Enter diagnosis and treatment..."></textarea>
            <input type="hidden" id="currentApptId">
          </div>
          <div class="modal-footer border-top border-secondary">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary" onclick="saveNotes()">Save & Complete</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast for Notifications -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
      <div id="liveToast" class="toast align-items-center text-white bg-primary border-0" role="alert">
        <div class="d-flex">
          <div class="toast-body" id="toastMessage">Message</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/doctor.js"></script>
</body>
</html>
