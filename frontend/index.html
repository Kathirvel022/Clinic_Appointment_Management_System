<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare Clinic - Your Health Matters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="favicon.png" type="image/x-icon">
</head>
<body class="d-flex flex-column h-100">

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fa-solid fa-notes-medical me-2"></i>MediCare
            </a>
            <div class="ms-auto d-flex align-items-center">
                <button id="themeToggle" class="btn btn-outline-secondary rounded-circle me-3">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex align-items-center py-5">
        <div class="row w-100 align-items-center justify-content-center">
            <div class="col-lg-6 text-center text-lg-start mb-5 mb-lg-0 animate-fade-up">
                <h1 class="display-4 fw-bold mb-4">Welcome to <span class="text-gradient">MediCare Clinic</span></h1>
                <p class="lead text-secondary mb-4">Modernizing healthcare with seamless online booking and comprehensive patient management.</p>
                <div class="d-flex gap-3 justify-content-center justify-content-lg-start">
                    <button class="btn btn-primary btn-lg" onclick="showForm('register')">Get Started</button>
                    <button class="btn btn-outline-primary btn-lg bg-surface" onclick="showForm('login')">Login</button>
                </div>
            </div>
            
            <div class="col-lg-5 offset-lg-1 animate-fade-up" style="animation-delay: 0.2s;">
                <div class="glass-panel p-5">
                    <!-- Login Form -->
                    <div id="loginForm">
                        <h3 class="fw-bold mb-4">Sign In</h3>
                        <form id="formLogin">
                            <div class="mb-3">
                                <label class="form-label text-secondary">Email address</label>
                                <input type="email" class="form-control" id="loginEmail" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary">Password</label>
                                <input type="password" class="form-control" id="loginPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                            <p class="text-center text-secondary mb-0">Don't have an account? <a href="#" onclick="showForm('register')" class="text-primary text-decoration-none fw-bold">Sign up</a></p>
                        </form>
                    </div>

                    <!-- Register Form -->
                    <div id="registerForm" class="d-none">
                        <h3 class="fw-bold mb-4">Create Account</h3>
                        <form id="formRegister">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-secondary">First Name</label>
                                    <input type="text" class="form-control" id="regFirstName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-secondary">Last Name</label>
                                    <input type="text" class="form-control" id="regLastName" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-secondary">Phone number</label>
                                <input type="tel" class="form-control" id="regPhone" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-secondary">Role</label>
                                <select class="form-select" id="regRole" required>
                                    <option value="patient" selected>Patient</option>
                                    <option value="doctor">Doctor</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-secondary">Email address</label>
                                <input type="email" class="form-control" id="regEmail" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary">Password</label>
                                <input type="password" class="form-control" id="regPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">Register</button>
                            <p class="text-center text-secondary mb-0">Already have an account? <a href="#" onclick="showForm('login')" class="text-primary text-decoration-none fw-bold">Sign in</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast for Notifications -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
      <div id="liveToast" class="toast align-items-center text-white bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body" id="toastMessage">Message</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
