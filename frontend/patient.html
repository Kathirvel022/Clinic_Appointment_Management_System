<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard - MediCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="favicon.png" type="image/x-icon">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fa-solid fa-notes-medical me-2"></i>MediCare
            </a>
            <div class="ms-auto d-flex align-items-center">
                <span id="userName" class="me-3 fw-bold"></span>
                <button id="themeToggle" class="btn btn-outline-secondary rounded-circle me-3">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="btn btn-outline-danger" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row mb-4">
            <div class="col">
                <h2 class="fw-bold">Welcome back, <span id="welcomeName" class="text-gradient"></span>!</h2>
            </div>
            <div class="col-auto">
                <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#editProfileModal">
                    Edit Profile
                </button>
            </div>
        </div>

        <div class="row">
            <!-- Book Appointment Section -->
            <div class="col-lg-4 mb-4">
                <div class="card h-100 p-4 shadow-sm animate-fade-up">
                    <h4 class="mb-4"><i class="fa-solid fa-calendar-plus text-primary me-2"></i>Book Appointment</h4>
                    <form id="formBookAppointment">
                        <div class="mb-3">
                            <label class="form-label">Select Doctor</label>
                            <select class="form-select" id="doctorSelect" required>
                                <option value="" disabled selected>Loading doctors...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" class="form-control" id="appointmentDate" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Time</label>
                            <input type="time" class="form-control" id="appointmentTime" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Reason for Visit</label>
                            <textarea class="form-control" id="reasonForVisit" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Confirm Booking</button>
                    </form>
                </div>
            </div>

            <!-- Appointments List -->
            <div class="col-lg-8 mb-4">
                <div class="card h-100 p-4 shadow-sm animate-fade-up" style="animation-delay: 0.1s;">
                    <h4 class="mb-4"><i class="fa-solid fa-clock-rotate-left text-primary me-2"></i>My Appointments</h4>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Doctor ID</th>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="appointmentsList">
                                <tr><td colspan="5" class="text-center">Loading appointments...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content bg-surface" style="color: var(--text-primary)">
          <div class="modal-header border-bottom border-secondary">
            <h5 class="modal-title">Edit Profile</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="formEditProfile">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" id="editFirstName" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="editLastName" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control" id="editPhone">
                </div>
                <button type="submit" class="btn btn-primary w-100">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast for Notifications -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
      <div id="liveToast" class="toast align-items-center text-white bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body" id="toastMessage">Message</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/patient.js"></script>
</body>
</html>
